<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Error 404</title>

<style>

body{
  margin:0;
  background:#000;
  height:100vh;
  overflow:hidden;
  font-family:Arial, sans-serif;
}

/* CONTENEDOR */
.error-container{
  position:relative;
  width:100%;
  height:100%;
}

/* FONDO */
.error-bg{
  position:absolute;
  width:100%;
  height:100%;
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
}

/* BOTON */
.error-button{
  position:absolute;
  cursor:pointer;
  transition:transform .25s ease;
}

/* 🔥 NUEVA ANIMACION (sube) */
.error-button:hover{
  transform:translateX(-50%) translateY(-8px);
}

.error-button img{
  width:100%;
  height:auto;
  display:block;
}

/* 📱 MOBILE */
@media (max-width:768px){

  .error-button{
    width:75%;
    max-width:320px;
    left:50%;
    bottom:20%;
    transform:translateX(-50%);
  }

}

/* 💻 PC */
@media (min-width:769px){

  .error-button{
    width:420px;
    left:50%;
    bottom:10%;
    transform:translateX(-50%);
  }

}

</style>
</head>

<body>

<div class="error-container">

  <!-- FONDO -->
  <div class="error-bg" id="errorBg"></div>

  <!-- BOTON -->
  <a id="errorBtn" class="error-button">
    <img id="btnImg" alt="Volver al menú">
  </a>

</div>

<script>

/* =========================
CONFIGURACION
========================= */

const pagina = {

  errorPC:{
    fondo:"https://endermanga.wordpress.com/wp-content/uploads/2026/04/naga-pc-definitivo.png?w=1440",
    boton:"https://endermanga.wordpress.com/wp-content/uploads/2026/04/buttom-pc.png",
    ruta:"/EnderVerse/"
  },

  errorCell:{
    fondo:"https://endermanga.wordpress.com/wp-content/uploads/2026/04/naga-mobile.png",
    boton:"https://endermanga.wordpress.com/wp-content/uploads/2026/04/buttom-cell.png",
    ruta:"/EnderVerse/"
  }

};

/* =========================
DETECTAR DISPOSITIVO
========================= */

function esCelular(){
  return window.innerWidth <= 768;
}

/* =========================
CARGAR CONTENIDO
========================= */

function cargarError(){

  const bg = document.getElementById("errorBg");
  const btn = document.getElementById("btnImg");
  const link = document.getElementById("errorBtn");

  const config = esCelular() ? pagina.errorCell : pagina.errorPC;

  bg.style.backgroundImage = `url("${config.fondo}")`;
  btn.src = config.boton;
  link.href = config.ruta;

}

cargarError();
window.addEventListener("resize", cargarError);

</script>

</body>
</html>
